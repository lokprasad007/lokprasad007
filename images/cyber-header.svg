<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="800" height="150">
  <defs>
    <!-- Filter for neon text glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');
    
    .bg {
      fill: #030305;
    }
    
    .thunder-img {
      opacity: 0.4;
      animation: lightning-flash 6s infinite;
    }
    
    .text-box {
      fill: #000000;
      opacity: 0.55;
    }
    
    .text-line {
      font-family: 'Orbitron', 'Segoe UI', -apple-system, sans-serif;
      font-weight: 700;
      fill: #ff0055;
      filter: url(#glow);
      opacity: 0;
      text-anchor: middle;
    }
    
    .line-1 {
      font-size: 36px;
      animation: cycle-1 12s infinite;
    }
    
    .line-2 {
      font-size: 26px;
      animation: cycle-2 12s infinite;
    }
    
    .line-3 {
      font-size: 30px;
      animation: cycle-3 12s infinite;
    }

    /* Thunder flash animation for the background image */
    @keyframes lightning-flash {
      0%, 78%, 80%, 83%, 86%, 100% { opacity: 0.35; filter: brightness(1); }
      79%, 81%, 82%, 84%, 85% { opacity: 1; filter: brightness(1.4); }
    }

    /* Text cycle animations */
    @keyframes cycle-1 {
      0%, 28% { opacity: 1; }
      30%, 100% { opacity: 0; }
    }
    @keyframes cycle-2 {
      0%, 30% { opacity: 0; }
      33%, 61% { opacity: 1; }
      63%, 100% { opacity: 0; }
    }
    @keyframes cycle-3 {
      0%, 63% { opacity: 0; }
      66%, 96% { opacity: 1; }
      98%, 100% { opacity: 0; }
    }
  </style>

  <!-- Background base color -->
  <rect class="bg" width="100%" height="100%" rx="10" />

  <!-- Thunder Background Image -->
  <image href="thunder-bg.png" x="0" y="-120" width="800" height="400" class="thunder-img" preserveAspectRatio="xMidYMid slice" />

  <!-- Semi-transparent overlay box for high readability -->
  <rect class="text-box" x="80" y="35" width="640" height="80" rx="8" />

  <!-- Animated Text Lines -->
  <text class="text-line line-1" x="400" y="85">LOK PRASAD</text>
  <text class="text-line line-2" x="400" y="85">LEARNING AND TRYING FOR IMPACT</text>
  <text class="text-line line-3" x="400" y="85">SYSTEMS INITIATED...</text>
</svg>
