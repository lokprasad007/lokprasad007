<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="800" height="150">
  <defs>
    <!-- Filter for neon text glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Filter for strong lightning glow -->
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="2" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');
    
    .bg {
      fill: #050508;
    }
    
    .lightning {
      stroke: #fcee0a;
      fill: none;
      filter: url(#glow-strong);
      opacity: 0.05;
    }
    
    .bolt-1 {
      stroke-width: 3;
      animation: strike-1 7s infinite;
    }
    
    .bolt-2 {
      stroke-width: 1.5;
      animation: strike-2 9s infinite;
    }
    
    .text-line {
      font-family: 'Orbitron', 'Segoe UI', -apple-system, sans-serif;
      font-weight: 700;
      fill: #fcee0a;
      filter: url(#glow);
      opacity: 0;
      text-anchor: middle;
    }
    
    .line-1 {
      font-size: 36px;
      animation: cycle-1 12s infinite;
    }
    
    .line-2 {
      font-size: 26px;
      animation: cycle-2 12s infinite;
    }
    
    .line-3 {
      font-size: 30px;
      animation: cycle-3 12s infinite;
    }

    /* Lightning animations */
    @keyframes strike-1 {
      0%, 84%, 86%, 89%, 92%, 100% { opacity: 0.05; }
      85%, 87%, 88%, 90%, 91% { opacity: 0.9; }
    }
    
    @keyframes strike-2 {
      0%, 42%, 44%, 47%, 50%, 100% { opacity: 0.03; }
      43%, 45%, 46%, 48%, 49% { opacity: 0.7; }
    }

    /* Text cycle animations */
    @keyframes cycle-1 {
      0%, 28% { opacity: 1; }
      30%, 100% { opacity: 0; }
    }
    @keyframes cycle-2 {
      0%, 30% { opacity: 0; }
      33%, 61% { opacity: 1; }
      63%, 100% { opacity: 0; }
    }
    @keyframes cycle-3 {
      0%, 63% { opacity: 0; }
      66%, 96% { opacity: 1; }
      98%, 100% { opacity: 0; }
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="100%" height="100%" rx="10" />

  <!-- Thunder/Lightning paths -->
  <!-- Left Bolt -->
  <path class="lightning bolt-1" d="M 150 0 L 170 30 L 140 60 L 190 100 L 160 150" />
  <!-- Center/Right Bolt -->
  <path class="lightning bolt-2" d="M 600 0 L 580 40 L 610 80 L 590 110 L 620 150" />
  <!-- Subtle Background lightning branching -->
  <path class="lightning bolt-1" d="M 380 0 L 400 20 L 390 40 L 410 70 L 405 100 M 400 20 L 430 45 L 420 70" stroke-width="1" />

  <!-- Animated Text Lines -->
  <text class="text-line line-1" x="400" y="85">LOK PRASAD</text>
  <text class="text-line line-2" x="400" y="85">LEARNING AND TRYING FOR IMPACT</text>
  <text class="text-line line-3" x="400" y="85">SYSTEMS INITIATED...</text>
</svg>
