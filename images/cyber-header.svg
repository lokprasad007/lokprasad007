<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="800" height="150">
  <defs>
    <!-- Filter for realistic lightning displacement -->
    <filter id="lightning-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="25" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <!-- Filter for neon text glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Filter for strong lightning glow -->
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');
    
    .bg {
      fill: #030305;
    }
    
    .lightning-glow {
      stroke: #00f0ff;
      stroke-width: 5;
      fill: none;
      filter: url(#glow-strong);
    }
    
    .lightning-core {
      stroke: #ffffff;
      stroke-width: 1.5;
      fill: none;
    }
    
    .bolt-group-1 {
      opacity: 0;
      animation: strike-1 7s infinite;
    }
    
    .bolt-group-2 {
      opacity: 0;
      animation: strike-2 9s infinite;
    }
    
    .text-line {
      font-family: 'Orbitron', 'Segoe UI', -apple-system, sans-serif;
      font-weight: 700;
      fill: #fcee0a;
      filter: url(#glow);
      opacity: 0;
      text-anchor: middle;
    }
    
    .line-1 {
      font-size: 36px;
      animation: cycle-1 12s infinite;
    }
    
    .line-2 {
      font-size: 26px;
      animation: cycle-2 12s infinite;
    }
    
    .line-3 {
      font-size: 30px;
      animation: cycle-3 12s infinite;
    }

    /* Realistic lightning strike flicker animations */
    @keyframes strike-1 {
      0%, 82%, 84%, 87%, 90%, 100% { opacity: 0; }
      83%, 85%, 86%, 88%, 89% { opacity: 1; }
    }
    
    @keyframes strike-2 {
      0%, 42%, 44%, 47%, 50%, 100% { opacity: 0; }
      43%, 45%, 46%, 48%, 49% { opacity: 1; }
    }

    /* Text cycle animations */
    @keyframes cycle-1 {
      0%, 28% { opacity: 1; }
      30%, 100% { opacity: 0; }
    }
    @keyframes cycle-2 {
      0%, 30% { opacity: 0; }
      33%, 61% { opacity: 1; }
      63%, 100% { opacity: 0; }
    }
    @keyframes cycle-3 {
      0%, 63% { opacity: 0; }
      66%, 96% { opacity: 1; }
      98%, 100% { opacity: 0; }
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="100%" height="100%" rx="10" />

  <!-- Thunder/Lightning groups with fractal displacement -->
  <!-- Left Bolt -->
  <g class="bolt-group-1" filter="url(#lightning-filter)">
    <path class="lightning-glow" d="M 150 0 L 160 30 L 140 60 L 180 90 L 160 150" />
    <path class="lightning-core" d="M 150 0 L 160 30 L 140 60 L 180 90 L 160 150" />
  </g>
  
  <!-- Right Bolt -->
  <g class="bolt-group-2" filter="url(#lightning-filter)">
    <path class="lightning-glow" d="M 620 0 L 600 40 L 630 80 L 610 110 L 640 150" />
    <path class="lightning-core" d="M 620 0 L 600 40 L 630 80 L 610 110 L 640 150" />
  </g>

  <!-- Animated Text Lines -->
  <text class="text-line line-1" x="400" y="85">LOK PRASAD</text>
  <text class="text-line line-2" x="400" y="85">LEARNING AND TRYING FOR IMPACT</text>
  <text class="text-line line-3" x="400" y="85">SYSTEMS INITIATED...</text>
</svg>
