<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cinematic Git Grid</title>
    <style>
        body {
            margin: 0;
            background-color: #050508;
            overflow: hidden;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

<div id="canvas-container"></div>

<script>
// --- 1. SETUP SCENE & CINEMATIC LIGHTING ---
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.015);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 35, 45);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x111122, 1.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
directionalLight.position.set(20, 40, 20);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
scene.add(directionalLight);

// Subtle floor grid glow
const pointLight = new THREE.PointLight(0x39d353, 0, 30);
scene.add(pointLight);

// --- 2. GENERATE 3D GRID MATRIX ---
const ROWS = 7;
const COLS = 40; // Scaled down slightly for tight cinematic framing
const BOX_SIZE = 1;
const GAP = 0.25;

const colors = {
    0: 0x161b22, // Empty
    1: 0x0e4429, // Low
    2: 0x006d32, // Medium
    3: 0x26a641, // High
    4: 0x39d353  // Ultra Glow
};

const boxGeometry = new THREE.BoxGeometry(BOX_SIZE, BOX_SIZE, BOX_SIZE);
const boxes = [];
let targets = [];

// Center offsets
const offsetX = ((COLS - 1) * (BOX_SIZE + GAP)) / 2;
const offsetZ = ((ROWS - 1) * (BOX_SIZE + GAP)) / 2;

for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
        // Create standard material with roughness for premium light reflection
        const material = new THREE.MeshStandardMaterial({
            color: colors[0],
            roughness: 0.4,
            metalness: 0.1
        });
        
        const box = new THREE.Mesh(boxGeometry, material);
        const posX = c * (BOX_SIZE + GAP) - offsetX;
        const posZ = r * (BOX_SIZE + GAP) - offsetZ;
        
        box.position.set(posX, 0, posZ);
        box.scale.set(1, 0.2, 1); // Flat initially
        box.castShadow = true;
        box.receiveShadow = true;
        scene.add(box);
        
        // Match the user's specific activity cluster layout at the end of the year (May/June)
        let commitLevel = 0;
        if (c > 32 && Math.random() > 0.3) {
            commitLevel = Math.floor(Math.random() * 4) + 1;
        } else if (c === 20 && r === 4) {
            commitLevel = 2; // Mid-way breakthrough box
        }

        const boxData = { mesh: box, level: commitLevel, r, c, active: false };
        boxes.push(boxData);
        
        if (commitLevel > 0) {
            targets.push(boxData);
        }
    }
}

// Sort targets chronologically (left to right)
targets.sort((a, b) => a.c - b.c || a.r - b.r);

// --- 3. CREATE STYLIZED LOW-POLY DEER ---
const deerGroup = new THREE.Group();

// Body
const bodyGeo = new THREE.BoxGeometry(1.2, 0.8, 0.6);
const deerMat = new THREE.MeshStandardMaterial({ color: 0xd4a373, roughness: 0.6 });
const body = new THREE.Mesh(bodyGeo, deerMat);
body.position.y = 0.8;
body.castShadow = true;
deerGroup.add(body);

// Neck & Head
const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
const head = new THREE.Mesh(headGeo, deerMat);
head.position.set(0.6, 1.5, 0);
head.castShadow = true;
deerGroup.add(head);

const neckGeo = new THREE.BoxGeometry(0.4, 0.7, 0.4);
const neck = new THREE.Mesh(neckGeo, deerMat);
neck.position.set(0.4, 1.2, 0);
neck.rotation.z = -0.3;
neck.castShadow = true;
deerGroup.add(neck);

// Antlers (Sleek geometric lines)
const antlerMat = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
const antlerL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), antlerMat);
antlerL.position.set(0.6, 1.9, 0.2);
antlerL.rotation.z = 0.2;
const antlerR = antlerL.clone();
antlerR.position.z = -0.2;
deerGroup.add(antlerL, antlerR);

// Simple Legs
const legGeo = new THREE.BoxGeometry(0.2, 0.8, 0.2);
const legFL = new THREE.Mesh(legGeo, deerMat); legFL.position.set(0.4, 0.4, 0.2);
const legFR = new THREE.Mesh(legGeo, deerMat); legFR.position.set(0.4, 0.4, -0.2);
const legBL = new THREE.Mesh(legGeo, deerMat); legBL.position.set(-0.4, 0.4, 0.2);
const legBR = new THREE.Mesh(legGeo, deerMat); legBR.position.set(-0.4, 0.4, -0.2);
deerGroup.add(legFL, legFR, legBL, legBR);

scene.add(deerGroup);

// Initial position at first box
if(targets.length > 0) {
    deerGroup.position.set(targets[0].mesh.position.x, 0, targets[0].mesh.position.y);
}

// --- 4. ANIMATION & INTERACTION LOGIC ---
let currentTargetIndex = 0;

function visitNextBox() {
    if (targets.length === 0) return;

    const target = targets[currentTargetIndex];
    const targetX = target.mesh.position.x;
    const targetZ = target.mesh.position.z;

    // Rotate deer toward destination coordinate
    const angle = Math.atan2(targetZ - deerGroup.position.z, targetX - deerGroup.position.x);
    gsap.to(deerGroup.rotation, { y: -angle, duration: 0.2 });

    // Procedural leg swing animation while moving
    const legTimeline = gsap.timeline({ repeat: 2, defaults: { duration: 0.15, yoyo: true } });
    legTimeline.to(legFL.rotation, { z: 0.4 }).to(legBL.rotation, { z: -0.4 }, 0);

    // Smoothly glide deer entity to target box
    gsap.to(deerGroup.position, {
        x: targetX,
        z: targetZ,
        duration: 0.8,
        ease: "power1.inOut",
        onComplete: () => {
            // Arrived! Pop the box upward into 3D space
            const targetMat = target.mesh.material;
            targetMat.color.setHex(colors[target.level]);
            
            // Activate neon emission glow if high commit level
            if (target.level >= 3) {
                targetMat.emissive.setHex(colors[target.level]);
                targetMat.emissiveIntensity = 0.6;
                pointLight.position.set(targetX, 2, targetZ);
                pointLight.intensity = 2;
            }

            // Scale growth up along Y/Z axis
            gsap.to(target.mesh.scale, { y: target.level * 1.5, x: 1.1, z: 1.1, duration: 0.2, yoyo: true, repeat: 1 });
            gsap.to(target.mesh.position, { y: (target.level * 1.5) / 2, duration: 0.2, yoyo: true, repeat: 1 });

            // Proceed down chronological path sequence
            currentTargetIndex = (currentTargetIndex + 1) % targets.length;
            
            // Loop back reset
            if (currentTargetIndex === 0) {
                setTimeout(() => {
                    boxes.forEach(b => {
                        b.mesh.material.color.setHex(colors[0]);
                        b.mesh.material.emissive.setHex(0x000000);
                        b.mesh.scale.set(1, 0.2, 1);
                        b.mesh.position.y = 0;
                    });
                    pointLight.intensity = 0;
                    visitNextBox();
                }, 2000);
            } else {
                setTimeout(visitNextBox, 300); // Small pause before moving onto next block
            }
        }
    });
}

// Start sequence
setTimeout(visitNextBox, 1000);

// --- 5. RENDER LOOP ---
let frame = 0;
function animate() {
    requestAnimationFrame(animate);
    frame += 0.01;
    
    // Slow dramatic cinematic camera drift
    camera.position.x = Math.sin(frame * 0.2) * 5;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
}
animate();

// Responsive window resizing
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
