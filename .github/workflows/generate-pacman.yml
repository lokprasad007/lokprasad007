name: Generate Pacman Contribution Graph

on:
  schedule:
    # Run once every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual run
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Generate Pacman SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          games: pacman

      - name: Apply Neon/Cyberpunk Theme to SVGs
        shell: bash
        run: |
          cat << 'EOF' > apply_neon.py
          import os
          
          dark_svg = 'dist/pacman-contribution-graph-dark.svg'
          light_svg = 'dist/pacman-contribution-graph.svg'
          
          dark_replaces = {
              '#0d1117': '#0c0f1d',  # background
              '#161b22': '#1f1115',  # empty cell (dark red-slate)
              '#0e4429': '#4d0b13',  # Level 1 (deep crimson)
              '#006d32': '#8a1225',  # Level 2 (medium red)
              '#26a641': '#c81938',  # Level 3 (bright red)
              '#39d353': '#ff2449'   # Level 4 (neon red)
          }
          
          light_replaces = {
              '#ebedf0': '#faebeb',  # empty cell
              '#9be9a8': '#ffccd1',  # Level 1
              '#40c463': '#ffa1ac',  # Level 2
              '#30a14e': '#ff6b7e',  # Level 3
              '#216e39': '#ff334b'   # Level 4
          }
          
          def apply(path, reps, is_dark):
              if not os.path.exists(path): return
              with open(path, 'r', encoding='utf-8') as f:
                  txt = f.read()
              
              # Apply contribution cell color replacements
              for o, n in reps.items():
                  txt = txt.replace(o, n)
                  txt = txt.replace(o.upper(), n)
                  
              # Apply wall color replacements
              lines = txt.split('\n')
              for i, line in enumerate(lines):
                  if 'id="wh-' in line or 'id="wv-' in line:
                      if is_dark:
                          lines[i] = line.replace('fill="#ffffff"', 'fill="#ff003c"')
                      else:
                          lines[i] = line.replace('fill="#000000"', 'fill="#8a1225"') \
                                         .replace('fill="#57606a"', 'fill="#8a1225"') \
                                         .replace('fill="#ffffff"', 'fill="#8a1225"')
              txt = '\n'.join(lines)
              
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(txt)
          
          apply(dark_svg, dark_replaces, is_dark=True)
          apply(light_svg, light_replaces, is_dark=False)
          EOF
          python apply_neon.py

      - name: Push Pacman SVG to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
